<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Music Tuner - Search</title>
  <link rel="stylesheet" href="style2.css">
  <link rel="stylesheet" href="style3.css">
</head>
<body>

<div class="sidebar">
  <div class="sidebar-header">
    <div class="logo-icon"><svg viewBox="0 0 24 24"><path d="M12 3v10.55A4 4 0 1 0 14 17V7h4V3h-6z"/></svg></div>
    <h2>Music <span>Tuner</span></h2>
  </div>
  <div class="sidebar-nav">
    <p class="nav-label">Menu</p>
    <ul>
      <li><a href="main.html"><span class="icon"><svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg></span> Home</a></li>
      <li class="active"><a href="Home.html"><span class="icon"><svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg></span> Search</a></li>
    </ul>
    <div class="sidebar-divider"></div>
    <p class="nav-label">Your Collection</p>
    <ul>
      <li><a href="library.html"><span class="icon"><svg viewBox="0 0 24 24"><path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-1 9h-4v4h-2v-4H9V9h4V5h2v4h4v2z"/></svg></span> Library</a></li>
      <li><a href="playlist.html"><span class="icon"><svg viewBox="0 0 24 24"><path d="M15 6H3v2h12V6zm0 4H3v2h12v-2zM3 16h8v-2H3v2zM17 6v8.18c-.31-.11-.65-.18-1-.18-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3V8h3V6h-5z"/></svg></span> Playlists</a></li>
    </ul>
  </div>
  <div class="sidebar-footer">
    <div class="now-playing-label">Now Playing</div>
    <div class="now-playing-info">
      <div class="equalizer">
        <div class="eq-bar"></div>
        <div class="eq-bar"></div>
        <div class="eq-bar"></div>
        <div class="eq-bar"></div>
      </div>
      <span class="now-playing-text" id="nowPlayingText">Nothing playing</span>
    </div>
  </div>
</div>

<div class="main">
  <h1 class="one">Search</h1>

  <div class="search-container">
    <span class="search-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="#aaa"><path d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg></span>
    <input type="text" class="search-bar" id="searchInput" placeholder="Search songs, artists, or categories..." oninput="filterSongs()">
  </div>

  <h2 class="section-title">Browse Categories</h2>
  <div class="categories">
    <div class="category cat-all" onclick="filterByCategory('all')">All Songs</div>
    <div class="category cat-tamil" onclick="filterByCategory('Tamil Pop')">Tamil Pop</div>
    <div class="category cat-hiphop" onclick="filterByCategory('Hip Hop')">Hip Hop</div>
    <div class="category cat-classical" onclick="filterByCategory('Classical')">Classical</div>
    <div class="category cat-romantic" onclick="filterByCategory('Romantic')">Romantic</div>
    <div class="category cat-high" onclick="filterByCategory('High Energy')">High Energy</div>
    <div class="category cat-melody" onclick="filterByCategory('Melody')">Melody</div>
  </div>

  <h2 class="section-title" id="resultsTitle">All Songs</h2>
  <ul class="song-list" id="songList"></ul>
</div>

<div class="player">
  <button onclick="prev()">⏮</button>
  <button id="playBtn" onclick="togglePlay()">▶</button>
  <button onclick="next()">⏭</button>
</div>

<audio id="audio"></audio>

<script>
const audio = document.getElementById("audio");
const playBtn = document.getElementById("playBtn");
const songListEl = document.getElementById("songList");
const searchInput = document.getElementById("searchInput");
const resultsTitle = document.getElementById("resultsTitle");

const songs = [
  { name: "Anirudh Hits",    file: "anis.mp3",     img: "Ani.webp",     type: "Tamil Pop",    tags: "anirudh tamil pop energy" },
  { name: "Andriya Vibes",   file: "ants.mp3",     img: "an.webp",      type: "Romantic",     tags: "andriya romantic chill" },
  { name: "Dhanush Boost",   file: "ds.mp3",       img: "D.webp",       type: "High Energy",  tags: "dhanush boost energy tamil" },
  { name: "GV Hits",         file: "gvs.mp3",      img: "GV.webp",      type: "Melody",       tags: "gv prakash melody tamil" },
  { name: "Hip Hop Hits",    file: "hips.mp3",     img: "hip.webp",     type: "Hip Hop",      tags: "hip hop rap beats" },
  { name: "Shreya Ghoshal",  file: "shrs.mp3",     img: "shr.webp",     type: "Classical",    tags: "shreya ghoshal classical melody" },
  { name: "Shruti Haasan",   file: "shruthis.mp3", img: "shruthi.webp", type: "Romantic",     tags: "shruti haasan romantic pop" },
  { name: "SPB Days",        file: "spbs.mp3",     img: "spb.webp",     type: "Classical",    tags: "spb balasubrahmanyam classical melody" },
  { name: "STR Mix",         file: "strrs.mp3",    img: "strr.webp",    type: "Tamil Pop",    tags: "str simbu tamil pop" },
  { name: "Vijay Blast",     file: "vijs.mp3",     img: "Vij.webp",     type: "High Energy",  tags: "vijay blast energy tamil" },
  { name: "U1 Drugs",        file: "u1s.mp3",      img: "u1.webp",      type: "Melody",       tags: "yuvan shankar raja melody" },
  { name: "Karthik Hits",    file: "kars.mp3",     img: "kar.webp",     type: "Melody",       tags: "karthik melody singer" },
  { name: "Antony Blast",    file: "ants.mp3",     img: "ant.webp",     type: "High Energy",  tags: "antony blast energy" },
  { name: "Sai Latest Hits", file: "sais.mp3",     img: "sai.webp",     type: "Tamil Pop",    tags: "sai pallavi latest tamil" },
  { name: "AR Hits",         file: "ars.mp3",      img: "AR.webp",      type: "Classical",    tags: "ar rahman classical oscar" }
];

let currentIndex = -1;
let filteredSongs = [...songs];

function renderSongs(list) {
  if (list.length === 0) {
    songListEl.innerHTML = '<div class="no-results">No songs found 😕</div>';
    return;
  }
  songListEl.innerHTML = list.map((song, i) => {
    const originalIndex = songs.indexOf(song);
    return `
      <li class="song-item" onclick="playSong(${originalIndex})">
        <img class="song-thumb" src="${song.img}" alt="${song.name}">
        <div class="song-info">
          <div class="song-name">${song.name}</div>
          <div class="song-type">${song.type}</div>
        </div>
        <button class="song-play-btn" onclick="event.stopPropagation(); playSong(${originalIndex})">▶</button>
      </li>
    `;
  }).join("");
}

function filterSongs() {
  const query = searchInput.value.toLowerCase().trim();
  if (query === "") {
    filteredSongs = [...songs];
    resultsTitle.textContent = "All Songs";
  } else {
    filteredSongs = songs.filter(s =>
      s.name.toLowerCase().includes(query) ||
      s.type.toLowerCase().includes(query) ||
      s.tags.toLowerCase().includes(query)
    );
    resultsTitle.textContent = `Results for "${searchInput.value}"`;
  }
  renderSongs(filteredSongs);
}

function filterByCategory(category) {
  searchInput.value = "";
  if (category === "all") {
    filteredSongs = [...songs];
    resultsTitle.textContent = "All Songs";
  } else {
    filteredSongs = songs.filter(s => s.type === category);
    resultsTitle.textContent = category;
  }
  renderSongs(filteredSongs);
}

function playSong(index) {
  currentIndex = index;
  audio.src = songs[currentIndex].file;
  audio.play();
  playBtn.textContent = "⏸";
}

function togglePlay() {
  if (currentIndex === -1) return;
  if (audio.paused) {
    audio.play();
    playBtn.textContent = "⏸";
  } else {
    audio.pause();
    playBtn.textContent = "▶";
  }
}

function next() {
  if (songs.length === 0) return;
  currentIndex = (currentIndex + 1) % songs.length;
  playSong(currentIndex);
}

function prev() {
  if (songs.length === 0) return;
  currentIndex = (currentIndex - 1 + songs.length) % songs.length;
  playSong(currentIndex);
}

audio.addEventListener("ended", function () {
  next();
});

// Initial render
renderSongs(songs);
</script>

</body>
</html>
